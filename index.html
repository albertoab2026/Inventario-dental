<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventario Dental - Alberto Ballarta</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 15px;
            /* DEGRADADO FUERTE: Este se verá en todos los celulares */
            background: linear-gradient(180deg, #00acc1 0%, #e0f7fa 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: #ffffff;
            width: 100%;
            max-width: 380px;
            padding: 25px;
            border-radius: 30px; /* Bordes más redondeados y modernos */
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
            border: 3px solid #ffffff; /* Borde blanco para que resalte del fondo azul */
        }

        .diente-principal {
            font-size: 60px;
            margin-bottom: 10px;
            display: inline-block;
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        h2 { color: #00796b; margin: 10px 0; font-size: 24px; font-weight: bold; }

        input {
            width: 100%;
            padding: 14px;
            margin-top: 12px;
            border: 2px solid #b2dfdb;
            border-radius: 15px;
            box-sizing: border-box;
            font-size: 16px;
            background-color: #f9f9f9;
        }

        .btn-vender {
            width: 100%;
            background: linear-gradient(45deg, #ffc107, #ff9800);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 152, 0, 0.4);
        }

        .seccion-pagos {
            margin-top: 25px;
            border-top: 2px dashed #00acc1;
            padding-top: 20px;
        }

        .btn-pago {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            border-radius: 12px;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        /* COLORES PEDIDOS POR ALBERTO */
        .plin { background-color: #00a8e1; } /* Celeste Plin */
        .yape { background-color: #6a1b9a; } /* Morado Yape */
        .efectivo { background-color: #2e7d32; } /* Verde Efectivo */

        .firma {
            font-size: 13px;
            color: #00796b;
            margin-top: 25px;
            font-weight: bold;
            padding-top: 15px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="diente-principal">🦷</div>
    <h2>Inventario Dental</h2>
    <p style="color: #666; font-size: 15px; margin-top: -5px;">Gestión de Alberto Ballarta</p>

    <input type="text" placeholder="Código: Ej: RES-A2">
    <input type="text" placeholder="Nombre: Ej: Resina 3M">
    <input type="number" placeholder="Cantidad a vender">

    <button class="btn-vender">🛒 REGISTRAR VENTA</button>

    <div class="seccion-pagos">
        <p style="font-weight: bold; color: #00796b; margin-bottom: 15px;">MÉTODOS DE PAGO</p>
        
        <button class="btn-pago plin">
            <span>🔵</span> Cobrar con PLIN
        </button>

        <button class="btn-pago yape">
            <span>🟣</span> Cobrar con YAPE
        </button>

        <button class="btn-pago efectivo">
            <span>💵</span> Cobrar en EFECTIVO
        </button>
    </div>

    <div class="firma">
        Creado por Alberto Ballarta - 2026
    </div>
</div>

</body>
</html>
